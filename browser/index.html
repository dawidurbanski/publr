<!DOCTYPE html>
<html>
<head>
    <title>Zig CMS</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/admin.css" id="admin-css">
    <style>
        /* Skeleton shown while WASM loads */
        body:not(.admin) {
            margin: 0;
            background: #22262f;
        }
        /* Suppress nav-slider transitions on page swap in browser preview */
        .nav-slider { transition: none !important; }
        .nav-panel { transition: none !important; }
    </style>
</head>
<body>

    <script type="module">
        import { initCMS } from './cms-runtime.js';

        let cms = null;

        async function handleFormSubmit(e) {
            const form = e.target.closest('form');
            if (!form) return;

            // Skip file upload form — handled by admin.js uploadFiles()
            if (form.id === 'media-upload-form') return;

            e.preventDefault();
            const action = form.getAttribute('action') || location.pathname;
            const formData = new URLSearchParams(new FormData(form)).toString();
            await navigate(action, formData, 'POST');
            await cms.save();
        }

        // Global delegation: catch submit on dynamically created forms too
        document.addEventListener('submit', handleFormSubmit);

        async function navigate(path, body = '', method = 'GET') {
            const res = await cms.request(method, path, body);

            // Handle redirects
            if (res.status === 302 && res.redirect) {
                history.pushState({}, '', res.redirect);
                return navigate(res.redirect);
            }

            // Update URL
            if (method === 'GET' && window.location.pathname !== path) {
                history.pushState({}, '', path);
            }

            // Replace the entire document with the response HTML
            const parser = new DOMParser();
            const doc = parser.parseFromString(res.body, 'text/html');
            document.title = doc.title || 'Publr';

            // Replace body
            document.body.className = doc.body.className;
            document.body.innerHTML = doc.body.innerHTML;

            // Initialize interactive components
            try {
                const { init } = await import('../static/interact/index.js');
                init();
            } catch (e) {}

            // Load admin.js behaviors
            try {
                const adminJs = document.createElement('script');
                adminJs.src = '/static/admin.js';
                document.body.appendChild(adminJs);
            } catch (e) {}

            // Intercept links
            document.querySelectorAll('a[href^="/"]').forEach(a => {
                a.addEventListener('click', e => {
                    e.preventDefault();
                    navigate(a.getAttribute('href'));
                });
            });

            // Load media images via blob URLs
            document.querySelectorAll('img[src^="/media/"]').forEach(async img => {
                const mediaPath = img.getAttribute('src').replace(/^\/media\//, '');
                try {
                    const { data, contentType } = await cms.getMedia(mediaPath);
                    if (data && data.length > 0) {
                        const blob = new Blob([data], { type: contentType || 'application/octet-stream' });
                        img.src = URL.createObjectURL(blob);
                    }
                } catch (e) { /* leave broken image */ }
            });
        }

        // Browser back/forward
        window.addEventListener('popstate', () => navigate(location.pathname));

        // Init
        (async () => {
            try {
                cms = await initCMS('/cms.wasm');
                window.cms = cms;
                window.navigate = navigate;

                // Auto-save periodically
                setInterval(() => cms.save(), 30000);

                // Navigate to current URL or default
                const path = location.pathname === '/' ? '/admin' : location.pathname;
                await navigate(path);
            } catch (e) {
                console.error(e);
            }
        })();
    </script>
</body>
</html>
